<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Verificador de Idade</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <body>
  <header>
    <h1>Verificador de Idade</h1>
  </header>
  <section>
    <div>
      <p>Ano de Nascimento: 
        <input type="number" name="txtano" id="txtano" min="0">
      </p>
      <p>Sexo: 
        <input type="radio" name="radsex" id="mas" checked>
        <label for="mas">Masculino</label>
        <input type="radio" name="radsex" id="fem">
        <label for="fem">Feminino</label>
      </p>
      <p>
        <input type="button" value="Verificar" onclick="verificar()">
      </p>
    </div>
    <div id="res">
      Preencha os dados acima para ver o resultado!
    </div>
    <div id="foto">
      <img src="https://images.unsplash.com/photo-1494959764136-6be9eb3c261e?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3wzMjM4NDZ8MHwxfHJhbmRvbXx8fHx8fHx8fDE3NzE0MjM5NTB8&ixlib=rb-4.1.0&q=80&w=400" alt="Foto" id="imagem">
    </div>
  </section>
  <footer>
    <p>&copy; CursoemVideo</p>
  </footer>
</body>
    <script  src="./script.js"></script>

  </body>
  
</html>
