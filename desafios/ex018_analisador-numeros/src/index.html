<body>
  <header>
    <h1>Analisador de Números</h1>
  </header>
  <section>
    <div>
      <p>Número (entre 1 e 100):</p>
      <input type="number" name="number" id="numero">
      <input type="button" value="Adicionar" id="adicionar" onclick="adicionar()">
      <div id="erro"></div>
    </div>
    <div>
      <select name="lista" id="lista" size="6">
        <option value="">Adicione um número</option>
      </select>
      <input type="button" value="Finalizar" onclick="finalizar()">
      <input type="button" value="Limpar" id="limpar" onclick="limpar()">
    </div>
    <div id="resultado"></div>
  </section>
  <footer>
    <p>&copy; CursoemVideo</p>
  </footer>
</body>
